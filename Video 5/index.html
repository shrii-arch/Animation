<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="B.Tech Web Developer">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
</head>
<body>
       <div class="banner">
        <!-- Your exact 6 anime database mapping - Cleaned & Secure -->
        <div class="slider" style="--quantity:6">
            <div class="item" style="--position: 1" data-video="https://www.youtube.com/embed/ofXigq9aIpo?si=fy9KbZ9yT4A5EZr6"><img src="anyaanime.jpg" alt="Spy x Family" width="200" height="250" loading="eager" decoding="async"></div>
            <div class="item" style="--position: 2" data-video="https://www.youtube.com/embed/knWebSSmDSA?si=XZUyH1mwUxCLawbe"><img src="darkmoon.jfif" alt="Dark Moon" width="200" height="250" loading="lazy" decoding="async"></div>
            <div class="item" style="--position: 3" data-video="https://www.youtube.com/embed/CemNP0vIiJI?si=3VjQ2hfrP9KH4uzX"><img src="hanakimi.jpg" alt="Hana Kimi" width="200" height="250" loading="lazy" decoding="async"></div>
            <div class="item" style="--position: 4" data-video="https://www.youtube.com/embed/g0JMPkn7Wuo?si=GiGGuGGJqWOAuZUR"><img src="Suzume.jpg" alt="Suzume" width="200" height="250" loading="lazy" decoding="async"></div>
            <div class="item" style="--position: 5" data-video="https://www.youtube.com/embed/wPFeBxt7VXI?si=5n4bn1pK4WIfuxOm"><img src="tanjiro.jfif" alt="Demon Slayer" width="200" height="250" loading="lazy" decoding="async"></div>
            <div class="item" style="--position: 6" data-video="https://www.youtube.com/embed/xU47nhruN-Q?si=V4ihbVTRvYnZ1JLC"><img src="Yourname.jpg" alt="Your Name" width="200" height="250" loading="lazy" decoding="async"></div>
        </div>
    </div>

        <!-- THE VIDEO MODAL POPUP (Hidden by default) -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <!-- Close Button -->
            <button class="close-btn" id="closeModalBtn">&times;</button>
            
            <!-- Video Container -->
            <div class="video-player-wrapper">
                <iframe id="videoIframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>
    <!-- 🎬 DYNAMIC ANIME CONTENT DISPLAY PLATE -->
    <div id="animeDetailsPlate" class="anime-details-plate">
        <h1 id="activeAnimeTitle">Spy x Family</h1>
        <p id="activeAnimeDesc">A spy on an undercover mission marries a professional assassin and adopts a telepathic child, completely unaware of each other's secret lives.</p>
    </div>
    <script src="script.js"></script>
</body>
